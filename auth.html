<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClassWorld — 로그인 중</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
body::before{content:'';position:absolute;top:-120px;right:-120px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);pointer-events:none;}
body::after{content:'';position:absolute;bottom:-100px;left:-80px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.1),transparent 70%);pointer-events:none;}

.card{
  position:relative;z-index:10;
  width:calc(100% - 40px);max-width:360px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:44px 36px 38px;
  backdrop-filter:blur(20px);
  box-shadow:0 40px 80px rgba(0,0,0,.5);
  animation:up .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.logo{text-align:center;margin-bottom:36px;}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(140deg,#1d4ed8,#2563eb,#4f46e5);
  margin-bottom:12px;
  box-shadow:0 8px 24px rgba(37,99,235,.4);
}
.logo-mark svg{width:26px;height:26px;}
.logo-name{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.4px;}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

.status{text-align:center;}
.ring-wrap{position:relative;width:72px;height:72px;margin:0 auto 22px;}
.ring{position:absolute;inset:0;border-radius:50%;}
.ring-bg{border:2px solid rgba(255,255,255,.06);}
.ring-outer{border:1.5px solid transparent;border-top-color:rgba(37,99,235,.3);border-right-color:rgba(139,92,246,.2);animation:spin 3s linear infinite;inset:-8px;}
.ring-main{border:2px solid transparent;border-top-color:#2563eb;border-right-color:#4f46e5;animation:spin .8s cubic-bezier(.4,0,.6,1) infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ring-center{position:absolute;inset:11px;border-radius:50%;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);display:flex;align-items:center;justify-content:center;}
.ring-done{position:absolute;inset:0;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:26px;animation:pop .4s cubic-bezier(.16,1,.3,1) both;}
.ring-done.ok{background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.25);}
.ring-done.fail{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.2);}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}

.s-title{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:6px;letter-spacing:-.02em;}
.s-sub{font-size:12px;color:rgba(255,255,255,.4);line-height:1.6;}

.badge{
  display:none;align-items:center;gap:6px;
  background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.2);
  border-radius:20px;padding:5px 13px;
  font-size:11px;font-weight:600;color:#93c5fd;
  margin:16px auto 0;width:fit-content;
}
.badge-dot{width:5px;height:5px;border-radius:50%;background:#38bdf8;animation:blink 1.2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.prog{margin-top:28px;}
.prog-bar{height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.prog-fill{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#2563eb,#4f46e5);transition:width .2s ease;}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:rgba(255,255,255,.2);letter-spacing:.04em;text-transform:uppercase;}

.err{display:none;margin-top:16px;padding:11px 13px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.15);border-radius:10px;font-size:12px;color:#fca5a5;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" fill="none"><rect x="1" y="1" width="7" height="7" rx="1.5" fill="#fff"/><rect x="11" y="1" width="7" height="7" rx="1.5" fill="rgba(255,255,255,.6)"/><rect x="1" y="11" width="7" height="7" rx="1.5" fill="rgba(255,255,255,.6)"/><rect x="11" y="11" width="7" height="7" rx="1.5" fill="rgba(255,255,255,.3)"/></svg>
    </div>
    <div class="logo-name">ClassWorld</div>
    <div class="logo-sub">by AOAO Studio</div>
  </div>

  <div class="status">
    <div class="ring-wrap">
      <div class="ring ring-bg"></div>
      <div class="ring ring-outer" id="rOuter"></div>
      <div class="ring ring-main"  id="rMain"></div>
      <div class="ring-center"     id="rIcon">🏫</div>
      <div class="ring-done ok"    id="rOk">✓</div>
      <div class="ring-done fail"  id="rFail">✕</div>
    </div>
    <div class="s-title" id="sTitle">로그인 처리 중</div>
    <div class="s-sub"   id="sSub">잠시만 기다려주세요</div>
    <div class="badge"   id="badge"><div class="badge-dot"></div><span id="badgeTxt">AOAO Studio 연결 중...</span></div>
  </div>

  <div class="prog">
    <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-meta"><span id="pLabel">세션 초기화</span><span id="pPct">0%</span></div>
  </div>
  <div class="err" id="errBox"></div>
</div>

<script>
// ClassWorld는 Supabase JS SDK 사용 (cw_sb_session 키)
// AOAO auth.html에서 token + refresh 받아서 supabase SDK에 주입
var SB_URL='https://puauncwwtbnsieulvhca.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1YXVuY3d3dGJuc2lldWx2aGNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDczMTMsImV4cCI6MjA4OTc4MzMxM30._3a4pg-ot9FxYHAywpq1Ic1eV1iLrPKGFymZJAPfE1A';

function prog(pct,lbl){
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pPct').textContent=pct+'%';
  if(lbl)document.getElementById('pLabel').textContent=lbl;
}
function hideSpinner(){
  ['rOuter','rMain','rIcon','badge'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.style.display='none';
  });
}
function done(title,sub,dest){
  hideSpinner();
  document.getElementById('rOk').style.display='flex';
  document.getElementById('sTitle').textContent=title;
  document.getElementById('sSub').textContent=sub;
  prog(100,'완료');
  setTimeout(function(){location.href=dest||'/';},900);
}
function fail(msg,dest){
  hideSpinner();
  document.getElementById('rFail').style.display='flex';
  document.getElementById('sTitle').textContent='오류 발생';
  document.getElementById('sSub').textContent='';
  var eb=document.getElementById('errBox');
  eb.style.display='block';eb.textContent=msg;
  document.getElementById('pFill').style.background='#ef4444';
  prog(100,'');
  setTimeout(function(){location.href=dest||'/';},2500);
}

(function(){
  var p=new URLSearchParams(location.search);
  var token  =p.get('token')||'';
  var refresh=p.get('refresh')||'';
  var redirect=p.get('redirect')||'/';

  document.getElementById('badge').style.display='flex';
  prog(20,'AOAO 토큰 확인 중');

  if(!token){return fail('토큰이 없습니다. AOAO Studio에서 다시 로그인해주세요.',redirect);}

  setTimeout(function(){
    prog(55,'ClassWorld 세션 설정 중');

    setTimeout(function(){
      try{
        // Supabase SDK 세션 형식으로 localStorage에 저장
        // storageKey: 'cw_sb_session'
        var sessObj={
          access_token:token,
          refresh_token:refresh||'',
          token_type:'bearer',
          expires_in:3600,
          expires_at:Math.floor(Date.now()/1000)+3600
        };
        localStorage.setItem('cw_sb_session',JSON.stringify({
          currentSession:sessObj,
          expiresAt:sessObj.expires_at
        }));

        prog(88,'ClassWorld로 이동 중');
        document.getElementById('badgeTxt').textContent='ClassWorld 로그인 완료';

        setTimeout(function(){
          done('ClassWorld에 로그인됐습니다 ✓','잠시 후 자동으로 이동합니다',redirect);
        },350);
      }catch(e){
        fail('오류: '+e.message,redirect);
      }
    },400);
  },500);
})();
</script>
</body>
</html>
